name: Diff Harness

# Headless OpenBOR Build 4086 (SDL 1.2) diff/debug-harness build (native x86-64,
# no QEMU). Sister of the 7533 harness. NOT the ship build. Fast (~2 min).
# MILESTONE 1a: prove the SDL 1.2 engine compiles headless on x86. Iterates from
# there (harness driver, --alarm/crash handlers, engine-logic patches, scan).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Run label'
        required: false
        type: string

run-name: ${{ inputs.reason || 'openbor4086-diff-harness' }}

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build OpenBOR 4086 headless (x86-64, SDL 1.2)
        run: bash .github/scripts/build_headless.sh
      - name: Stage binary
        if: success()
        run: |
          mkdir -p bundle
          cp /tmp/OpenBOR_headless bundle/OpenBOR_headless 2>/dev/null || true
          ls -lh bundle || true
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openbor4086-headless-linux
          path: bundle/*
